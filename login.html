<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MCQ Practice Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-body">
  <main class="card auth-card">
    <h1>Emerging Trends in CE &amp; IT</h1>
    <p class="subtext">Sign in to continue your MCQ practice.</p>

    <form id="loginForm" class="form-stack">
      <label for="username">Email</label>
      <input id="username" name="email" type="email" required autocomplete="email" placeholder="Enter email">

      <label for="password">Password</label>
      <input id="password" name="password" type="password" required autocomplete="current-password" placeholder="Enter password">

      <button type="submit" class="btn primary">Login</button>
    </form>

    <p id="loginMessage" class="error-text" aria-live="polite"></p>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="firebase-auth.js"></script>
  <script src="script.js"></script>
</body>
</html>
