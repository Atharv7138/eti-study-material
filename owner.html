<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Owner User Management</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="topbar">
    <h1>Owner Panel - User Management</h1>
    <div class="row-gap">
      <button id="toLandingBtn" class="btn ghost">Back</button>
      <button id="logoutBtn" class="btn ghost">Logout</button>
    </div>
  </header>

  <main class="card page-card">
    <h2>Add New User</h2>
    <form id="ownerUserForm" class="form-stack">
      <label for="ownerUsername">Email</label>
      <input id="ownerUsername" type="email" required autocomplete="off" placeholder="student@example.com">

      <label for="ownerPassword">Password</label>
      <input id="ownerPassword" type="password" required autocomplete="new-password" minlength="6" placeholder="Minimum 6 characters">

      <label for="ownerRole">Role</label>
      <select id="ownerRole">
        <option value="student">Student</option>
        <option value="owner">Owner</option>
      </select>

      <button type="submit" class="btn primary">Create User</button>
    </form>

    <p id="ownerMessage" class="subtext" aria-live="polite"></p>

    <h2>Existing Users</h2>
    <div id="usersList" class="users-list"></div>

    <h2 class="section-heading">Suspected Login Attempts</h2>
    <div id="suspectedLogsList" class="logs-list"></div>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="firebase-auth.js"></script>
  <script src="script.js"></script>
</body>
</html>
