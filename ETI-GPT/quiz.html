<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unit 1 Quiz</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="topbar">
    <h1>Unit 1 Quiz</h1>
    <button id="logoutBtn" class="btn ghost">Logout</button>
  </header>

  <main class="card quiz-card">
    <div class="quiz-head">
      <span id="setTitle"></span>
      <span id="progressText"></span>
    </div>

    <h2 id="questionText" class="question-text"></h2>
    <div id="optionsList" class="options-list"></div>

    <div class="quiz-actions">
      <button id="prevBtn" class="btn ghost">Previous</button>
      <button id="nextBtn" class="btn primary">Next</button>
      <button id="submitBtn" class="btn warn">Submit</button>
    </div>
    <p class="subtext">No time limit is applied for this quiz.</p>
  </main>

  <div id="feedbackPopup" class="feedback-popup" role="status" aria-live="polite"></div>

  <script src="users.js"></script>
  <script src="script.js"></script>
</body>
</html>
